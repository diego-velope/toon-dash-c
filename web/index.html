<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Toon Dash (C/Raylib Version)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        canvas.emscripten { border: 0 none; background-color: #000; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <!-- The TV PAL intercepts TV remote inputs and calls window.mq_handle_* APIs -->
    <script src="tv-pal.js"></script>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    
    <script type='text/javascript'>
      var Module = {
        preRun: [],
        postRun: [],
        print: (function() {
          return function(text) { console.log(text); };
        })(),
        printErr: function(text) { console.error(text); },
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);
          return canvas;
        })()
      };

      // tv-pal.js relies on window.mq_handle_* functions.
      // We route them to the Emscripten exposed C functions (which have EMSCRIPTEN_KEEPALIVE).
      window.mq_handle_up = function(pressed) { if (Module.ccall) Module.ccall('mq_handle_up', 'v', ['number'], [pressed]); };
      window.mq_handle_down = function(pressed) { if (Module.ccall) Module.ccall('mq_handle_down', 'v', ['number'], [pressed]); };
      window.mq_handle_left = function(pressed) { if (Module.ccall) Module.ccall('mq_handle_left', 'v', ['number'], [pressed]); };
      window.mq_handle_right = function(pressed) { if (Module.ccall) Module.ccall('mq_handle_right', 'v', ['number'], [pressed]); };
      window.mq_handle_action = function(pressed) { if (Module.ccall) Module.ccall('mq_handle_action', 'v', ['number'], [pressed]); };
      window.mq_handle_back = function(pressed) { if (Module.ccall) Module.ccall('mq_handle_back', 'v', ['number'], [pressed]); };
    </script>
    
    <!-- Load the actual WASM bundle -->
    <script async type="text/javascript" src="toon_dash.js"></script>
</body>
</html>
